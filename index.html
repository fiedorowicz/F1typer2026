<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Typer 2026 — Tomek · Magda · Kuba</title>
<meta name="description" content="Domowy typer F1 2026. Top 5 wyścigu, pole position, sprint, DNF.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --asfalt:#13151A; --panel:#1C1F26; --panel-2:#171A20;
    --linia:rgba(235,238,245,.10); --linia-mocna:rgba(235,238,245,.22);
    --bialy:#EBEEF5; --dim:rgba(235,238,245,.55); --faint:rgba(235,238,245,.32);
    --czerwony:#E8392E; --bursztyn:#E8B84B; --zielony:#46C46A;
    --traf:#46C46A; --obec:#E8B84B; --pudlo:rgba(235,238,245,.28);
    --r:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} *{animation:none!important;transition:none!important} }
  body{background:var(--asfalt);color:var(--bialy);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
  button{font:inherit}
  .num{font-family:"Saira Condensed",sans-serif;font-variant-numeric:tabular-nums}

  /* nagłówek: linia startu */
  header{position:relative;overflow:hidden;border-bottom:1px solid var(--linia);padding:40px 20px 28px;text-align:center;
    background:radial-gradient(ellipse 80% 120% at 50% -30%, rgba(232,57,46,.12), transparent 62%),var(--asfalt)}
  /* szachownica mety */
  header::after{content:"";position:absolute;left:0;right:0;bottom:0;height:8px;
    background-image:linear-gradient(45deg,var(--bialy) 25%,transparent 25%,transparent 75%,var(--bialy) 75%),
                     linear-gradient(45deg,var(--bialy) 25%,transparent 25%,transparent 75%,var(--bialy) 75%);
    background-size:16px 16px;background-position:0 0,8px 8px;opacity:.18}
  .eyebrow{font-family:"Saira Condensed",sans-serif;text-transform:uppercase;letter-spacing:.32em;font-size:13px;color:var(--dim);margin-bottom:6px}
  h1{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(38px,8vw,64px);line-height:.92;letter-spacing:.02em}
  h1 .rok{color:var(--czerwony)}
  .zasady{margin-top:12px;font-size:13px;color:var(--dim);max-width:620px;margin-left:auto;margin-right:auto}
  .zasady b{color:var(--bialy)}

  main{max-width:880px;margin:0 auto;padding:24px 16px 80px}

  /* logowanie */
  .login{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;
    background:var(--panel);border:1px solid var(--linia);border-radius:var(--r);padding:12px 14px;margin-bottom:26px}
  .login label{font-size:13px;color:var(--dim)}
  .login select,.login input{background:var(--panel-2);border:1px solid var(--linia-mocna);color:var(--bialy);border-radius:6px;padding:8px 10px;font:inherit;font-size:14px}
  .login input{width:90px;text-align:center;letter-spacing:.2em}
  .login select:focus-visible,.login input:focus-visible,.btn:focus-visible,.kierowca-opcja:focus-visible{outline:2px solid var(--czerwony);outline-offset:2px}
  .btn{background:var(--czerwony);color:#fff;border:none;border-radius:6px;font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:14px;padding:9px 18px;cursor:pointer}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.drugi{background:transparent;color:var(--dim);border:1px solid var(--linia-mocna)}
  .zalogowany-info{display:flex;align-items:center;gap:10px;font-size:14px}
  .zalogowany-info .kropka{width:9px;height:9px;border-radius:50%}
  .login-blad{width:100%;text-align:center;font-size:13px;color:var(--czerwony)}

  .info-pasek{text-align:center;color:var(--faint);padding:36px 0;font-size:14px}
  .info-pasek.blad{color:var(--czerwony)}

  /* tablica */
  .scoreboard{background:var(--panel);border:1px solid var(--linia);border-radius:var(--r);overflow:hidden;margin-bottom:34px}
  .pasek-lidera{height:4px;background:var(--linia)}
  .sb-naglowek{display:flex;justify-content:space-between;align-items:baseline;padding:14px 18px 0}
  .sb-naglowek h2{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:16px;color:var(--dim)}
  .sb-naglowek .postep{font-size:12px;color:var(--faint)}
  table{width:100%;border-collapse:collapse}
  .scoreboard th{font-family:"Saira Condensed",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--faint);text-align:right;padding:14px 18px 8px;border-bottom:1px solid var(--linia)}
  .scoreboard th:first-child{text-align:left}
  .scoreboard td{padding:12px 18px;border-bottom:1px solid var(--linia);text-align:right;vertical-align:middle}
  .scoreboard tr:last-child td{border-bottom:none}
  .scoreboard td:first-child{text-align:left}
  .gracz-cell{display:flex;align-items:center;gap:10px}
  .gracz-kolor{width:10px;height:10px;border-radius:50%;flex:none}
  .gracz-nazwa{font-weight:600;font-size:16px}
  .pozycja{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:14px;color:var(--faint);width:18px;display:inline-block}
  .pkt{font-family:"Saira Condensed",sans-serif;font-weight:800;font-size:34px;line-height:1;font-variant-numeric:tabular-nums}
  td.kol-pkt{width:90px}
  .stat-sm{font-size:14px;color:var(--dim);font-variant-numeric:tabular-nums}
  .lider .pkt{color:var(--czerwony)}
  @media(max-width:560px){.pkt{font-size:28px}}

  .sekcja-naglowek{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:16px;color:var(--dim);margin:0 0 12px;display:flex;justify-content:space-between;align-items:baseline}
  .sekcja-naglowek .dopisek{font-family:"IBM Plex Sans",sans-serif;text-transform:none;letter-spacing:0;font-weight:400;font-size:12px;color:var(--faint)}

  /* sesja do obstawienia */
  .sesja-box{background:var(--panel);border:1px solid var(--linia);border-radius:var(--r);padding:16px;margin-bottom:14px}
  .sesja-box.pilna{border-color:rgba(232,57,46,.45)}
  .sesja-naglowek{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .sesja-tytul{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:18px}
  .sesja-typ{font-size:12px;color:var(--czerwony);font-family:"Saira Condensed",sans-serif;text-transform:uppercase;letter-spacing:.1em}
  .sesja-deadline{font-size:12px;color:var(--faint);margin-bottom:12px}

  /* sloty wyboru (grid startowy) */
  .sloty{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
  .slot{display:flex;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--linia);border-radius:8px;padding:8px 10px}
  .slot-poz{font-family:"Saira Condensed",sans-serif;font-weight:800;font-size:18px;color:var(--czerwony);width:26px;text-align:center;flex:none}
  .slot-kierowca{flex:1;font-weight:600;font-size:15px}
  .slot-kierowca.pusty{color:var(--faint);font-weight:400}
  .slot-kod{font-family:"Saira Condensed",sans-serif;font-weight:700;color:var(--dim);font-size:13px}
  .slot-x{background:transparent;border:none;color:var(--faint);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px}
  .slot-x:hover{color:var(--czerwony)}

  .pula-kierowcow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .kierowca-opcja{background:var(--panel-2);border:1px solid var(--linia-mocna);color:var(--bialy);border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:border-color .12s,opacity .12s}
  .kierowca-opcja .kod{font-family:"Saira Condensed",sans-serif;font-weight:700;color:var(--dim);font-size:12px}
  .kierowca-opcja:hover{border-color:var(--czerwony)}
  .kierowca-opcja:disabled{opacity:.3;cursor:default}

  .sesja-akcje{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .sesja-akcje .uwaga{font-size:12px;color:var(--faint);margin-right:auto}
  .sesja-status{font-size:13px}
  .sesja-status.blad{color:var(--czerwony)}
  .sesja-status.ok{color:var(--zielony)}

  /* lista rund / wyniki */
  .runda{background:var(--panel-2);border:1px solid var(--linia);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
  .runda.nastepna{border-color:rgba(232,57,46,.4)}
  .runda-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .runda-nazwa{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:.03em}
  .runda-nr{font-family:"Saira Condensed",sans-serif;font-weight:700;color:var(--faint);font-size:13px}
  .runda-meta{font-size:12px;color:var(--faint);margin-bottom:10px}
  .sprint-tag{display:inline-block;font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--bursztyn);border:1px solid rgba(232,184,75,.4);border-radius:4px;padding:1px 6px;margin-left:8px}

  .wynik-blok{margin-top:8px;padding-top:10px;border-top:1px dashed var(--linia)}
  .wynik-rzad{display:flex;gap:8px;align-items:baseline;font-size:13px;margin-bottom:4px;flex-wrap:wrap}
  .wynik-label{font-family:"Saira Condensed",sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:var(--faint);width:64px;flex:none}
  .wynik-tresc{color:var(--bialy)}
  .wynik-tresc .sep{color:var(--faint)}

  .typy-gracze{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .typ-gracz-rzad{font-size:13px}
  .typ-gracz-glowa{display:flex;align-items:center;gap:8px;margin-bottom:2px}
  .typ-gracz-glowa .kropka{width:8px;height:8px;border-radius:50%}
  .typ-gracz-glowa .imie{font-weight:600}
  .typ-gracz-glowa .pkt-runda{font-family:"Saira Condensed",sans-serif;font-weight:700;color:var(--bursztyn);font-size:13px}
  .typ-detale{padding-left:16px;color:var(--dim);font-size:12px;display:flex;flex-direction:column;gap:2px}
  .typ-detale .ukr{color:var(--faint);font-style:italic}
  .traf-poz{color:var(--traf);font-weight:600}
  .traf-obec{color:var(--obec)}

  .filtry{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .filtr{background:transparent;border:1px solid var(--linia-mocna);color:var(--dim);font-family:"Saira Condensed",sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:13px;font-weight:600;padding:7px 16px;border-radius:999px;cursor:pointer}
  .filtr:hover{color:var(--bialy)}
  .filtr.aktywny{background:var(--bialy);color:var(--asfalt);border-color:var(--bialy)}

  /* widok porównawczy — 3 kolumny */
  .porownanie{background:var(--panel);border:1px solid var(--linia);border-radius:var(--r);padding:16px;margin-bottom:34px}
  .porownanie-naglowek{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:4px;flex-wrap:wrap}
  .porownanie-tytul{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:20px}
  .porownanie-meta{font-size:12px;color:var(--faint);margin-bottom:14px}
  .por-sesja{margin-bottom:16px}
  .por-sesja:last-child{margin-bottom:0}
  .por-sesja-tytul{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:var(--bursztyn);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .por-sesja-tytul .real{color:var(--dim);font-weight:600;letter-spacing:.02em}
  .por-kolumny{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .por-kol{background:var(--panel-2);border:1px solid var(--linia);border-radius:8px;padding:8px 10px;min-width:0}
  .por-kol-glowa{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--linia)}
  .por-kol-glowa .kropka{width:8px;height:8px;border-radius:50%;flex:none}
  .por-kol-glowa .imie{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .por-kol-glowa .pkt-mini{margin-left:auto;font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:13px;color:var(--bursztyn)}
  .por-lista{display:flex;flex-direction:column;gap:3px;font-size:13px}
  .por-poz{display:flex;gap:6px;align-items:baseline}
  .por-poz .nr{font-family:"Saira Condensed",sans-serif;font-weight:700;color:var(--faint);font-size:11px;width:14px;flex:none}
  .por-poz .kod{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:13px}
  .por-poz.traf .kod{color:var(--traf)}
  .por-poz.obec .kod{color:var(--obec)}
  .por-pusto{color:var(--faint);font-style:italic;font-size:12px}
  .por-ukryty{color:var(--dim);font-size:12px}
  .por-niezlozony{color:var(--czerwony);font-size:12px;opacity:.8}
  @media(max-width:560px){
    .porownanie{padding:12px}
    .por-kolumny{gap:5px}
    .por-kol{padding:6px 7px}
    .por-kol-glowa .imie{font-size:11px}
    .por-poz .kod{font-size:12px}
  }

  footer{text-align:center;font-size:12px;color:var(--faint);padding:30px 16px 40px;border-top:1px solid var(--linia)}
</style>
</head>
<body>

<header>
  <p class="eyebrow">Tomek · Magda · Kuba</p>
  <h1>F1 Typer <span class="rok">2026</span></h1>
  <p class="zasady">wyścig: <b>3 pkt</b> za pozycję / <b>1 pkt</b> za obecność w top 5 · pole position <b>2 pkt</b> · sprint: <b>3/1</b> za top 3 · pierwszy DNF <b>2 pkt</b></p>
</header>

<main>
  <section class="login" id="loginBox" aria-label="Logowanie"></section>
  <div id="zawartosc"><p class="info-pasek">Ładowanie danych…</p></div>
</main>

<footer>Wyniki pobierają się automatycznie z Jolpiki · cudze typy zobaczysz, gdy sam obstawisz daną sesję</footer>

<script>
(function(){
  "use strict";

  // ============================================================
  //  WKLEJ URL APLIKACJI APPS SCRIPT (kończy się na /exec)
  // ============================================================
  var API_URL = "https://script.google.com/macros/s/AKfycbzqy-R1UTlb72o-fqEb0bv7p_8Qu-UWnV_gZDg9LFzggCV0g5R5QveaThVDEWj3IKdJnw/exec";

  var SESJE_META = {
    sprint: { tytul: "Sprint", opis: "Wytypuj top 3", dlugosc: 3 },
    quali:  { tytul: "Kwalifikacje", opis: "Wytypuj zdobywcę pole position", dlugosc: 1 },
    wyscig: { tytul: "Wyścig", opis: "Wytypuj top 5", dlugosc: 5 }
  };

  function esc(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }

  var STAN = {
    dane: null, filtr: "nadchodzace", porownanieRound: null,
    gracz: localStorage.getItem("f1_gracz") || "",
    pin:   localStorage.getItem("f1_pin")   || "",
    bufor: {} // round_sesja -> [driverId...] budowane przed wysłaniem
  };

  // ---------- pobieranie ----------
  function laduj(){
    var url = API_URL + "?gracz=" + encodeURIComponent(STAN.gracz) + "&pin=" + encodeURIComponent(STAN.pin) + "&t=" + Date.now();
    fetch(url).then(function(r){ return r.json(); }).then(function(d){
      STAN.dane = d; rysujLogin(); rysujWszystko();
    }).catch(function(){
      document.getElementById("zawartosc").innerHTML =
        '<p class="info-pasek blad">Nie udało się pobrać danych. Odśwież stronę.' +
        (API_URL.indexOf("TUTAJ") === 0 ? "<br>Uwaga: w index.html nie wklejono adresu API_URL." : "") + '</p>';
    });
  }

  function zapiszTyp(round, sesja, typ, dnf, cb){
    fetch(API_URL, { method:"POST",
      body: JSON.stringify({ gracz:STAN.gracz, pin:STAN.pin, round:round, sesja:sesja, typ:typ, dnf:dnf })
    }).then(function(r){ return r.json(); }).then(cb)
      .catch(function(){ cb({ ok:false, blad:"Błąd połączenia — spróbuj jeszcze raz." }); });
  }

  function nazwiskoKierowcy(driverId){
    var k = (STAN.dane.kierowcy || []).find(function(x){ return x.driverId === driverId; });
    return k ? k.nazwisko : driverId;
  }
  function kodKierowcy(driverId){
    var k = (STAN.dane.kierowcy || []).find(function(x){ return x.driverId === driverId; });
    return k && k.kod ? k.kod : "";
  }

  // ---------- logowanie ----------
  function rysujLogin(){
    var box = document.getElementById("loginBox"); var d = STAN.dane;
    if(!d){ box.innerHTML = ""; return; }
    if(d.zalogowany){
      var g = d.gracze.find(function(x){ return x.id === d.zalogowany; });
      box.innerHTML = '<span class="zalogowany-info"><span class="kropka" style="background:'+esc(g.kolor)+'"></span>Typujesz jako <b>'+esc(g.nazwa)+'</b></span><button class="btn drugi" id="btnWyloguj">Wyloguj</button>';
      document.getElementById("btnWyloguj").addEventListener("click", function(){
        STAN.gracz=""; STAN.pin=""; localStorage.removeItem("f1_gracz"); localStorage.removeItem("f1_pin"); laduj();
      });
      return;
    }
    var opcje = d.gracze.map(function(g){ return '<option value="'+esc(g.id)+'">'+esc(g.nazwa)+'</option>'; }).join("");
    box.innerHTML = '<label for="selGracz">Kto typuje?</label><select id="selGracz">'+opcje+'</select>' +
      '<input id="inpPin" type="password" inputmode="numeric" maxlength="8" placeholder="PIN" aria-label="PIN">' +
      '<button class="btn" id="btnZaloguj">Wejdź</button>' +
      (STAN.gracz && STAN.pin ? '<span class="login-blad">Zły gracz lub PIN — spróbuj jeszcze raz.</span>' : '');
    document.getElementById("btnZaloguj").addEventListener("click", function(){
      STAN.gracz = document.getElementById("selGracz").value;
      STAN.pin = document.getElementById("inpPin").value.trim();
      localStorage.setItem("f1_gracz", STAN.gracz); localStorage.setItem("f1_pin", STAN.pin); laduj();
    });
    document.getElementById("inpPin").addEventListener("keydown", function(ev){ if(ev.key==="Enter") document.getElementById("btnZaloguj").click(); });
  }

  // ---------- punktacja (lustro backendu) ----------
  function punktyTop(typ, real, pktPoz, pktObec, dl){
    if(!typ || !real) return {suma:0, szczegoly:[]};
    var realTop = real.slice(0, dl), suma=0, szczeg=[];
    for(var i=0;i<typ.length;i++){
      if(realTop[i] === typ[i]){ suma+=pktPoz; szczeg.push({d:typ[i], stan:"poz", pkt:pktPoz}); }
      else if(realTop.indexOf(typ[i]) !== -1){ suma+=pktObec; szczeg.push({d:typ[i], stan:"obec", pkt:pktObec}); }
      else szczeg.push({d:typ[i], stan:"pudlo", pkt:0});
    }
    return {suma:suma, szczegoly:szczeg};
  }

  function punktyRundyDlaGracza(r, graczId){
    var P = STAN.dane.punktacja, suma = 0;
    var t = r.typy || {};
    if(r.sprint && t.sprint && t.sprint[graczId] && t.sprint[graczId] !== "ukryty" && r.wynik.sprintTop3){
      suma += punktyTop(t.sprint[graczId], r.wynik.sprintTop3, P.pozycjaSprint, P.obecnoscSprint, 3).suma;
    }
    if(t.quali && t.quali[graczId] && t.quali[graczId] !== "ukryty" && r.wynik.pole){
      if(t.quali[graczId][0] === r.wynik.pole) suma += P.pole;
    }
    if(t.wyscig && t.wyscig[graczId] && t.wyscig[graczId] !== "ukryty" && r.wynik.top5){
      suma += punktyTop(t.wyscig[graczId], r.wynik.top5, P.pozycjaWyscig, P.obecnoscWyscig, 5).suma;
    }
    if(t.dnf && t.dnf[graczId] && t.dnf[graczId] !== "ukryty" && r.wynik.dnf){
      if(t.dnf[graczId][0] === r.wynik.dnf) suma += P.dnf;
    }
    return suma;
  }

  // ---------- rysowanie ----------
  function rysujWszystko(){
    var d = STAN.dane, kont = document.getElementById("zawartosc");
    if(!d || !d.ok || !d.rundy){ kont.innerHTML = '<p class="info-pasek blad">Błąd danych z serwera.</p>'; return; }
    kont.innerHTML = htmlTablica() + htmlDoObstawienia() + htmlPorownanie() +
      '<nav class="filtry">' + ["nadchodzace","rozegrane","wszystkie"].map(function(f){
        var n={nadchodzace:"Nadchodzące",rozegrane:"Rozegrane",wszystkie:"Wszystkie"};
        return '<button class="filtr'+(STAN.filtr===f?" aktywny":"")+'" data-f="'+f+'">'+n[f]+'</button>';
      }).join("") + '</nav><section id="rundy">'+htmlListaRund()+'</section>';

    kont.querySelectorAll(".filtr").forEach(function(b){
      if(b.classList.contains("por-nawig")) return;
      b.addEventListener("click", function(){
        STAN.filtr=b.dataset.f;
        kont.querySelectorAll(".filtr").forEach(function(x){ if(!x.classList.contains("por-nawig")) x.classList.remove("aktywny");});
        b.classList.add("aktywny");
        document.getElementById("rundy").innerHTML = htmlListaRund();
      });
    });
    kont.querySelectorAll(".por-nawig").forEach(function(b){
      b.addEventListener("click", function(){ STAN.porownanieRound = b.dataset.round; rysujWszystko(); });
    });
    podepnijObstawianie();
  }

  function htmlTablica(){
    var d = STAN.dane;
    var staty = {};
    d.gracze.forEach(function(g){ staty[g.id]={g:g, pkt:0}; });
    var rozegranych = 0;
    d.rundy.forEach(function(r){
      var maWynik = r.wynik.top5 || r.wynik.pole || r.wynik.sprintTop3;
      if(maWynik) rozegranych++;
      d.gracze.forEach(function(g){ staty[g.id].pkt += punktyRundyDlaGracza(r, g.id); });
    });
    var ranking = d.gracze.map(function(g){ return staty[g.id]; }).sort(function(a,b){
      if(b.pkt!==a.pkt) return b.pkt-a.pkt; return a.g.nazwa.localeCompare(b.g.nazwa,"pl");
    });
    var jestLider = ranking[0] && ranking[0].pkt>0;
    var wiersze = ranking.map(function(s,i){
      var lider = jestLider && s.pkt===ranking[0].pkt ? ' class="lider"' : '';
      return '<tr'+lider+'><td><span class="gracz-cell"><span class="pozycja">'+(i+1)+'.</span>'+
        '<span class="gracz-kolor" style="background:'+esc(s.g.kolor)+'"></span>'+
        '<span class="gracz-nazwa">'+esc(s.g.nazwa)+'</span></span></td>'+
        '<td class="kol-pkt"><span class="pkt">'+s.pkt+'</span></td></tr>';
    }).join("");
    return '<section class="scoreboard">'+
      '<div class="pasek-lidera" style="background:'+(jestLider?esc(ranking[0].g.kolor):'var(--linia)')+'"></div>'+
      '<div class="sb-naglowek"><h2>Klasyfikacja</h2><span class="postep">rozegrane: '+rozegranych+' / '+d.rundy.length+' rund</span></div>'+
      '<table><thead><tr><th>Gracz</th><th>Punkty</th></tr></thead><tbody>'+wiersze+'</tbody></table></section>';
  }

  // ---------- WIDOK PORÓWNAWCZY: najbliższy weekend, 3 kolumny ----------
  // Pokazuje rundę wskazaną przez STAN.porownanieRound (domyślnie najbliższą
  // nierozegraną). Typy wg zasady: swój zawsze, cudze gdy sam obstawiłeś sesję.
  function rundaDoPorownania(){
    var d = STAN.dane;
    if(STAN.porownanieRound){
      var wybr = d.rundy.find(function(r){ return r.round === STAN.porownanieRound; });
      if(wybr) return wybr;
    }
    // domyślnie: pierwsza runda bez wyniku wyścigu (spójnie z sekcją obstawiania)
    for(var i=0;i<d.rundy.length;i++){
      if(!d.rundy[i].wynik.top5) return d.rundy[i];
    }
    return d.rundy[d.rundy.length-1] || null;
  }

  function htmlPorownanie(){
    var d = STAN.dane;
    var r = rundaDoPorownania();
    if(!r) return "";

    // które sesje pokazać i w jakiej kolejności
    var sesje = r.sprint ? ["sprint","quali","wyscig","dnf"] : ["quali","wyscig","dnf"];

    var blokiSesji = sesje.map(function(sesja){
      var dl = (sesja==="dnf") ? r.deadline.wyscig : r.deadline[sesja];
      var poDeadline = dl && new Date(dl) <= new Date();
      var realLabel = "";
      if(sesja==="wyscig" && r.wynik.top5) realLabel = "wynik: "+r.wynik.top5.map(function(x){return kodKierowcy(x);}).join(" › ");
      else if(sesja==="sprint" && r.wynik.sprintTop3) realLabel = "wynik: "+r.wynik.sprintTop3.map(function(x){return kodKierowcy(x);}).join(" › ");
      else if(sesja==="quali" && r.wynik.pole) realLabel = "pole: "+kodKierowcy(r.wynik.pole);
      else if(sesja==="dnf" && r.wynik.dnf) realLabel = "1. DNF: "+kodKierowcy(r.wynik.dnf);

      var tytuly = { sprint:"Sprint — top 3", quali:"Kwalifikacje — pole", wyscig:"Wyścig — top 5", dnf:"Pierwszy DNF" };

      var kolumny = d.gracze.map(function(g){
        var t = r.typy[sesja] && r.typy[sesja][g.id];
        var pkt = maWynikSesji(r, sesja) ? punktySesji(r, sesja, g.id) : null;
        var trescTypu;
        if(t === null || t === undefined){
          trescTypu = '<span class="por-niezlozony">— nie wytypował —</span>';
        } else if(t === "ukryty"){
          trescTypu = '<span class="por-ukryty">🔒 obstawione</span>';
        } else {
          var dl2 = SESJE_META[sesja] ? SESJE_META[sesja].dlugosc : 1;
          var real = sesja==="wyscig" ? r.wynik.top5 : (sesja==="sprint" ? r.wynik.sprintTop3 : (sesja==="quali" ? (r.wynik.pole?[r.wynik.pole]:null) : (r.wynik.dnf?[r.wynik.dnf]:null)));
          trescTypu = '<div class="por-lista">' + t.map(function(did,i){
            var klasa = "";
            if(real){
              var realTop = real.slice(0, (sesja==="quali"||sesja==="dnf")?1:dl2);
              if(realTop[i]===did) klasa=" traf";
              else if(realTop.indexOf(did)!==-1 && (sesja==="wyscig"||sesja==="sprint")) klasa=" obec";
            }
            var nrPoz = (sesja==="quali"||sesja==="dnf") ? "" : '<span class="nr">'+(i+1)+'</span>';
            return '<div class="por-poz'+klasa+'">'+nrPoz+'<span class="kod">'+esc(kodKierowcy(did)||did)+'</span></div>';
          }).join("") + '</div>';
        }
        return '<div class="por-kol"><div class="por-kol-glowa"><span class="kropka" style="background:'+esc(g.kolor)+'"></span>'+
          '<span class="imie">'+esc(g.nazwa)+'</span>'+(pkt!==null?'<span class="pkt-mini">+'+pkt+'</span>':'')+'</div>'+trescTypu+'</div>';
      }).join("");

      return '<div class="por-sesja"><div class="por-sesja-tytul">'+tytuly[sesja]+
        (realLabel?'<span class="real">· '+esc(realLabel)+'</span>':'')+'</div>'+
        '<div class="por-kolumny">'+kolumny+'</div></div>';
    }).join("");

    // nawigacja: poprzednia / następna runda (żeby wrócić do rozegranych)
    var idx = d.rundy.findIndex(function(x){ return x.round===r.round; });
    var prev = idx>0 ? d.rundy[idx-1].round : null;
    var next = idx<d.rundy.length-1 ? d.rundy[idx+1].round : null;
    var nawig = '<div style="display:flex;gap:8px">'+
      (prev?'<button class="filtr por-nawig" data-round="'+prev+'">‹ poprzednia</button>':'')+
      (next?'<button class="filtr por-nawig" data-round="'+next+'">następna ›</button>':'')+'</div>';

    return '<section class="porownanie"><div class="porownanie-naglowek">'+
      '<span class="porownanie-tytul">'+esc(r.nazwa)+(r.sprint?'<span class="sprint-tag">Sprint</span>':'')+'</span>'+nawig+'</div>'+
      '<div class="porownanie-meta">'+esc(r.kraj)+' · R'+esc(r.round)+' · porównanie typów</div>'+
      blokiSesji+'</section>';
  }

  function maWynikSesji(r, sesja){
    if(sesja==="wyscig") return !!r.wynik.top5;
    if(sesja==="sprint") return !!r.wynik.sprintTop3;
    if(sesja==="quali") return !!r.wynik.pole;
    if(sesja==="dnf") return !!r.wynik.dnf;
    return false;
  }

  function punktySesji(r, sesja, graczId){
    var P = STAN.dane.punktacja;
    var t = r.typy[sesja] && r.typy[sesja][graczId];
    if(!t || t==="ukryty") return 0;
    if(sesja==="wyscig" && r.wynik.top5) return punktyTop(t, r.wynik.top5, P.pozycjaWyscig, P.obecnoscWyscig, 5).suma;
    if(sesja==="sprint" && r.wynik.sprintTop3) return punktyTop(t, r.wynik.sprintTop3, P.pozycjaSprint, P.obecnoscSprint, 3).suma;
    if(sesja==="quali" && r.wynik.pole) return t[0]===r.wynik.pole ? P.pole : 0;
    if(sesja==="dnf" && r.wynik.dnf) return t[0]===r.wynik.dnf ? P.dnf : 0;
    return 0;
  }

  // sesje otwarte do typowania — TYLKO z jednej, bieżącej rundy:
  // pierwszej, która nie ma jeszcze wyniku wyścigu. Kolejna runda otwiera się
  // dopiero, gdy poprzednia ma rozegrany wyścig (r.wynik.top5).
  function otwarteSesje(){
    var d = STAN.dane; if(!d.zalogowany) return [];
    var teraz = new Date(), lista = [];

    // znajdź bieżącą rundę: pierwsza bez wyniku wyścigu
    var biezaca = null;
    for(var i=0;i<d.rundy.length;i++){
      if(!d.rundy[i].wynik.top5){ biezaca = d.rundy[i]; break; }
    }
    if(!biezaca) return [];

    ["sprint","quali","wyscig"].forEach(function(sesja){
      if(sesja==="sprint" && !biezaca.sprint) return;
      var dl = biezaca.deadline[sesja];
      if(!dl || new Date(dl) <= teraz) return;       // sesja już wystartowała
      var mojTyp = biezaca.typy[sesja] && biezaca.typy[sesja][d.zalogowany];
      if(mojTyp) return;                              // już obstawione
      lista.push({ round:biezaca.round, nazwa:biezaca.nazwa, sesja:sesja, deadline:dl });
    });
    lista.sort(function(a,b){ return new Date(a.deadline)-new Date(b.deadline); });
    return lista;
  }

  var fmtDeadline = new Intl.DateTimeFormat("pl-PL",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});

  function htmlDoObstawienia(){
    var d = STAN.dane;
    if(!d.zalogowany) return '<div style="margin-bottom:34px"><h2 class="sekcja-naglowek">Do obstawienia<span class="dopisek">zaloguj się powyżej, żeby typować</span></h2></div>';
    var lista = otwarteSesje();
    if(!lista.length) return '<div style="margin-bottom:34px"><h2 class="sekcja-naglowek">Do obstawienia</h2><p class="info-pasek" style="padding:14px 0">Brak otwartych sesji — wszystko obstawione albo czekamy na kolejny weekend 🏁</p></div>';

    var karty = lista.map(function(s){
      var meta = SESJE_META[s.sesja];
      var bufKey = s.round + "_" + s.sesja;
      var wybrani = STAN.bufor[bufKey] || [];
      // sloty
      var sloty = "";
      for(var i=0;i<meta.dlugosc;i++){
        var did = wybrani[i];
        sloty += '<div class="slot"><span class="slot-poz">'+(i+1)+'</span>'+
          (did
            ? '<span class="slot-kierowca">'+esc(nazwiskoKierowcy(did))+'</span><span class="slot-kod">'+esc(kodKierowcy(did))+'</span><button class="slot-x" data-buf="'+bufKey+'" data-i="'+i+'" aria-label="Usuń">✕</button>'
            : '<span class="slot-kierowca pusty">— wybierz kierowcę —</span>')+
          '</div>';
      }
      // pula
      var pula = (d.kierowcy||[]).map(function(k){
        var uzyty = wybrani.indexOf(k.driverId) !== -1;
        var pelna = wybrani.length >= meta.dlugosc;
        return '<button class="kierowca-opcja" data-buf="'+bufKey+'" data-driver="'+esc(k.driverId)+'"'+
          ((uzyty||pelna)?' disabled':'')+'>'+esc(k.nazwisko)+' <span class="kod">'+esc(k.kod)+'</span></button>';
      }).join("");

      // DNF — tylko przy wyścigu, osobny slot + osobna pula
      var dnfHtml = "", dnfGotowy = true;
      if(s.sesja === "wyscig"){
        var dnfKey = s.round + "_dnf";
        var dnfWybrany = (STAN.bufor[dnfKey] || [])[0] || null;
        dnfGotowy = !!dnfWybrany;
        var dnfSlot = '<div class="slot"><span class="slot-poz" style="color:var(--bursztyn)">✕</span>'+
          (dnfWybrany
            ? '<span class="slot-kierowca">'+esc(nazwiskoKierowcy(dnfWybrany))+'</span><span class="slot-kod">'+esc(kodKierowcy(dnfWybrany))+'</span><button class="slot-x" data-buf="'+dnfKey+'" data-i="0" aria-label="Usuń">✕</button>'
            : '<span class="slot-kierowca pusty">— kto pierwszy odpadnie? —</span>')+
          '</div>';
        var dnfPula = (d.kierowcy||[]).map(function(k){
          return '<button class="kierowca-opcja" data-buf="'+dnfKey+'" data-driver="'+esc(k.driverId)+'" data-single="1"'+
            (dnfWybrany?' disabled':'')+'>'+esc(k.nazwisko)+' <span class="kod">'+esc(k.kod)+'</span></button>';
        }).join("");
        dnfHtml = '<div class="sesja-deadline" style="margin-top:10px;margin-bottom:6px">Pierwszy DNF · 2 pkt</div>'+
          '<div class="sloty">'+dnfSlot+'</div><div class="pula-kierowcow">'+dnfPula+'</div>';
      }

      var gotowy = wybrani.length === meta.dlugosc && dnfGotowy;
      return '<div class="sesja-box pilna" data-round="'+s.round+'" data-sesja="'+s.sesja+'">'+
        '<div class="sesja-naglowek"><span class="sesja-tytul">'+esc(s.nazwa)+'</span><span class="sesja-typ">'+meta.tytul+'</span></div>'+
        '<div class="sesja-deadline">'+meta.opis+' · zamknięcie: '+esc(fmtDeadline.format(new Date(s.deadline)))+'</div>'+
        '<div class="sloty">'+sloty+'</div>'+
        '<div class="pula-kierowcow">'+pula+'</div>'+
        dnfHtml +
        '<div class="sesja-akcje"><span class="uwaga">kolejność ma znaczenie · bez zmian po zapisie</span>'+
        '<span class="sesja-status"></span>'+
        '<button class="btn btn-zapisz" '+(gotowy?'':'disabled')+'>Zapisz typ</button></div></div>';
    }).join("");
    return '<div style="margin-bottom:34px"><h2 class="sekcja-naglowek">Do obstawienia <span class="dopisek">'+lista.length+' '+(lista.length===1?'sesja':'sesji')+'</span></h2>'+karty+'</div>';
  }

  function podepnijObstawianie(){
    // dodawanie kierowcy do bufora
    document.querySelectorAll(".kierowca-opcja").forEach(function(b){
      if(b.disabled) return;
      b.addEventListener("click", function(){
        var key=b.dataset.buf, did=b.dataset.driver;
        if(!STAN.bufor[key]) STAN.bufor[key]=[];
        if(b.dataset.single==="1"){ STAN.bufor[key]=[did]; }       // DNF: zawsze jeden
        else if(STAN.bufor[key].indexOf(did)===-1) STAN.bufor[key].push(did);
        rysujWszystko();
      });
    });
    // usuwanie ze slotu
    document.querySelectorAll(".slot-x").forEach(function(b){
      b.addEventListener("click", function(){
        var key=b.dataset.buf, i=parseInt(b.dataset.i,10);
        if(STAN.bufor[key]) STAN.bufor[key].splice(i,1);
        rysujWszystko();
      });
    });
    // zapis
    document.querySelectorAll(".sesja-box").forEach(function(box){
      var btn = box.querySelector(".btn-zapisz"); if(!btn) return;
      btn.addEventListener("click", function(){
        var round=box.dataset.round, sesja=box.dataset.sesja, key=round+"_"+sesja;
        var typ=STAN.bufor[key]||[], status=box.querySelector(".sesja-status");
        if(typ.length !== SESJE_META[sesja].dlugosc){ status.className="sesja-status blad"; status.textContent="Uzupełnij wszystkie pozycje."; return; }
        var dnf = null;
        if(sesja==="wyscig"){
          dnf = (STAN.bufor[round+"_dnf"]||[])[0] || null;
          if(!dnf){ status.className="sesja-status blad"; status.textContent="Wskaż kandydata na pierwszy DNF."; return; }
        }
        if(btn.dataset.potwierdz!=="1"){ btn.dataset.potwierdz="1"; btn.textContent="Na pewno zapisać?"; return; }
        btn.disabled=true; btn.textContent="Zapisuję…";
        zapiszTyp(round, sesja, typ, dnf, function(odp){
          if(odp.ok){ delete STAN.bufor[key]; delete STAN.bufor[round+"_dnf"]; status.className="sesja-status ok"; status.textContent="Zapisane ✔"; setTimeout(laduj,700); }
          else { btn.disabled=false; btn.dataset.potwierdz=""; btn.textContent="Zapisz typ"; status.className="sesja-status blad"; status.textContent=odp.blad||"Nie udało się zapisać."; }
        });
      });
    });
  }

  var fmtRunda = new Intl.DateTimeFormat("pl-PL",{day:"numeric",month:"long"});

  function htmlListaRund(){
    var d = STAN.dane, teraz=new Date();
    var lista = d.rundy.filter(function(r){
      var maWynik = r.wynik.top5 || r.wynik.pole || r.wynik.sprintTop3;
      if(STAN.filtr==="rozegrane") return !!maWynik;
      if(STAN.filtr==="nadchodzace") return !maWynik;
      return true;
    });
    if(!lista.length) return '<p class="info-pasek">Nic tu nie ma.</p>';

    var nastepna=null;
    for(var i=0;i<d.rundy.length;i++){
      var mw = d.rundy[i].wynik.top5||d.rundy[i].wynik.pole||d.rundy[i].wynik.sprintTop3;
      if(!mw){ nastepna=d.rundy[i].round; break; }
    }

    return lista.map(function(r){
      var maWynik = r.wynik.top5 || r.wynik.pole || r.wynik.sprintTop3;
      var html = '<div class="runda'+(r.round===nastepna?' nastepna':'')+'">'+
        '<div class="runda-top"><span class="runda-nazwa">'+esc(r.nazwa)+(r.sprint?'<span class="sprint-tag">Sprint</span>':'')+'</span>'+
        '<span class="runda-nr">R'+esc(r.round)+'</span></div>'+
        '<div class="runda-meta">'+esc(r.kraj)+' · wyścig '+esc(fmtRunda.format(new Date(r.deadline.wyscig)))+'</div>';

      if(maWynik){
        html += '<div class="wynik-blok">';
        if(r.wynik.sprintTop3) html += wynikRzad("Sprint", r.wynik.sprintTop3);
        if(r.wynik.pole) html += wynikRzad("Pole", [r.wynik.pole]);
        if(r.wynik.top5) html += wynikRzad("Wyścig", r.wynik.top5);
        if(r.wynik.dnf) html += wynikRzad("1. DNF", [r.wynik.dnf]);
        html += '</div>';
      }

      // typy graczy (po deadline widoczne)
      html += '<div class="typy-gracze">';
      d.gracze.forEach(function(g){
        var pkt = punktyRundyDlaGracza(r, g.id);
        var ma = false;
        ["sprint","quali","wyscig"].forEach(function(s){ if(r.typy[s] && r.typy[s][g.id]) ma=true; });
        if(!ma) return;
        html += '<div class="typ-gracz-rzad"><div class="typ-gracz-glowa"><span class="kropka" style="background:'+esc(g.kolor)+'"></span>'+
          '<span class="imie">'+esc(g.nazwa)+'</span>'+(maWynik?'<span class="pkt-runda">+'+pkt+'</span>':'')+'</div><div class="typ-detale">';
        ["wyscig","quali","sprint"].forEach(function(sesja){
          if(sesja==="sprint" && !r.sprint) return;
          var t = r.typy[sesja] && r.typy[sesja][g.id];
          if(!t) return;
          if(t==="ukryty"){ html += '<span class="ukr">'+SESJE_META[sesja].tytul+': 🔒 obstawione</span>'; return; }
          html += '<span>'+SESJE_META[sesja].tytul+': '+formatTyp(sesja, t, r.wynik)+'</span>';
        });
        // DNF gracza
        var td = r.typy.dnf && r.typy.dnf[g.id];
        if(td){
          if(td==="ukryty") html += '<span class="ukr">1. DNF: 🔒 obstawione</span>';
          else {
            var trafil = r.wynik.dnf && td[0]===r.wynik.dnf;
            html += '<span>1. DNF: '+(trafil?'<span class="traf-poz">':'')+esc(kodKierowcy(td[0])||td[0])+(trafil?'</span>':'')+'</span>';
          }
        }
        html += '</div></div>';
      });
      html += '</div></div>';
      return html;
    }).join("");
  }

  function wynikRzad(label, arr){
    var tresc = arr.map(function(did){ return esc(kodKierowcy(did)||nazwiskoKierowcy(did)); }).join(' <span class="sep">›</span> ');
    return '<div class="wynik-rzad"><span class="wynik-label">'+label+'</span><span class="wynik-tresc">'+tresc+'</span></div>';
  }

  function formatTyp(sesja, typ, wynik){
    var dl = SESJE_META[sesja].dlugosc;
    var real = sesja==="wyscig" ? wynik.top5 : (sesja==="sprint" ? wynik.sprintTop3 : (wynik.pole?[wynik.pole]:null));
    return typ.map(function(did,i){
      var kod = esc(kodKierowcy(did)||did);
      if(!real) return kod;
      var realTop = real.slice(0,dl);
      if(realTop[i]===did) return '<span class="traf-poz">'+kod+'</span>';
      if(realTop.indexOf(did)!==-1) return '<span class="traf-obec">'+kod+'</span>';
      return kod;
    }).join(' <span class="sep">›</span> ');
  }

  laduj();
})();
